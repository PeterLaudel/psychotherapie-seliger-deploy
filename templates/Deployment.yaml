apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["node_modules/.bin/tsx", "tasks/dbMigrate.ts"]
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url
            - name: DATABASE_DIALECT
              value: postgres
      containers:
      - name: {{ .Values.name | default .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: Always
        env:
          - name: POSTGRES_URL
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: database-url
          - name: DATABASE_DIALECT
            value: postgres
          - name: NODE_ENV
            value: production
          - name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: google-client-id
          - name: GOOGLE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: google-client-secret
          - name: NEXTAUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: nextauth-secret
          - name: NEXTAUTH_URL
            value: https://{{ .Values.ingress.hostname }}
          - name: PDF_OWNER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: pdf-owner-password
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 200Mi
          limits:
            cpu: 100m
            memory: 400Mi
      imagePullSecrets:
        - name: gcr-credentials